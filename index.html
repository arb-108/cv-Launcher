<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CV Launcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-0: #0a0b10;
    --bg-1: #11131c;
    --bg-2: #181b27;
    --bg-3: #232636;
    --line: #2a2e42;
    --text:  #e8e9f1;
    --muted: #8b8fa8;
    --dim:   #5c5f78;
    --accent: #c4ff3f;
    --accent-soft: #c4ff3f22;
    --danger: #ff5577;
    --ok: #5fffa1;
    --warn: #ffcb5f;
    --r: 14px;
    --rs: 8px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg-0);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 12% -10%, #c4ff3f12 0%, transparent 40%),
      radial-gradient(circle at 90% 110%, #5f8fff12 0%, transparent 45%);
    background-attachment: fixed;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 36px 28px 80px; }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 36px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  header.top h1 {
    margin: 0;
    font-size: 44px;
    letter-spacing: -1.5px;
    font-weight: 600;
    line-height: 1;
  }
  header.top h1 .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 16px var(--accent);
    transform: translateY(-6px);
    margin-left: 4px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
  header.top .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  header.top .who {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    text-align: right;
  }
  header.top .who b { color: var(--accent); font-weight: 500; }

  .grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 24px;
  }
  .card h2 {
    font-size: 13px;
    margin: 0 0 18px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card h2 .left { display: flex; align-items: center; gap: 10px; }
  .card h2 .left::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }
  .card h2 .add-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    transition: all .15s;
  }
  .card h2 .add-btn:hover { color: var(--accent); border-color: var(--accent); }

  label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 16px 0 8px;
  }
  input[type="text"], input[type="email"], textarea, select {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--rs);
    color: var(--text);
    padding: 12px 14px;
    font-size: 15px;
    font-family: 'Fraunces', serif;
    transition: border-color .2s, background .2s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-3);
  }
  textarea { resize: vertical; min-height: 200px; line-height: 1.6; font-size: 14px; }

  .chips { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .chip {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--rs);
    padding: 14px;
    cursor: pointer;
    transition: all .18s;
    position: relative;
    overflow: hidden;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent-soft); border-color: var(--accent); }
  .chip .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    padding-right: 50px;
  }
  .chip .status { font-size: 11px; color: var(--ok); font-family: 'JetBrains Mono', monospace; }
  .chip .actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
  .chip .icon-btn {
    background: var(--bg-3);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }
  .chip .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .chip .icon-btn.del:hover { color: var(--danger); border-color: var(--danger); }

  .btn {
    background: var(--accent);
    color: #0a0b10;
    border: none;
    border-radius: var(--rs);
    padding: 14px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s;
    width: 100%;
    margin-top: 18px;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px -4px var(--accent);
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--accent); box-shadow: none; transform: none; }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px 22px;
    border-radius: var(--rs);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    transition: transform .3s ease;
    z-index: 1000;
    max-width: 90%;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: var(--ok); color: var(--ok); }
  #toast.err { border-color: var(--danger); color: var(--danger); }

  .history-list { max-height: 380px; overflow-y: auto; padding-right: 6px; }
  .history-list::-webkit-scrollbar { width: 6px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
  .hist-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-item .he {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    word-break: break-all;
    font-size: 12px;
  }
  .hist-item .meta {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .hist-item .meta .cv-tag { color: var(--accent); }
  .empty {
    text-align: center;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 30px 10px;
  }

  .api-config { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .api-config input { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 10px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
  }
  .status-dot.ok  { background: var(--ok);    box-shadow: 0 0 8px var(--ok); }
  .status-dot.err { background: var(--danger); }

  footer {
    text-align: center;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-top: 50px;
    letter-spacing: 1px;
  }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(10, 11, 16, 0.85);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 500;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 28px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-size: 13px;
    margin: 0 0 20px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .modal-actions .btn { margin-top: 0; }
  .file-status {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .file-status.loaded { color: var(--ok); }

  .card { animation: rise .5s ease backwards; }
  .card:nth-child(1) { animation-delay: .05s; }
  .card:nth-child(2) { animation-delay: .15s; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

    <div class="modal-actions">
      <button class="btn ghost" id="cancelTpl">Cancel</button>
      <button class="btn" id="saveTpl">Save Template</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="newCvPicker" accept="application/pdf" style="display:none" />

// ---- runtime state ----
const state = {
  selectedCV: 'flutter',
  templates: {},   // { key: { label, subject, body, cv_name, cv_data } }
  apiUrl: DEFAULT_API_URL,
  history: [],
  custom: {}       // user-added templates persisted in storage
};

// ---- storage helpers ----
const storage = {
  async get(key) {
    if (window.storage) {
      try { const r = await window.storage.get(key); return r ? r.value : null; } catch { return null; }
    }
    try { return localStorage.getItem(key); } catch { return null; }
  },
  async set(key, val) {
    if (window.storage) {
      try { await window.storage.set(key, val); return; } catch {}
    }
    try { localStorage.setItem(key, val); } catch {}
  }
};

// ---- DOM refs ----
const $ = id => document.getElementById(id);
const chipsEl = $('cvChips');
const subjectEl = $('subject');
const bodyEl = $('body');
const hrEl = $('hrEmail');
const apiUrlEl = $('apiUrl');
const apiDot = $('apiDot');
const sendBtn = $('sendBtn');
const historyList = $('historyList');
const modalBg = $('modalBg');

// ---- chip rendering ----
function renderChips() {
  chipsEl.innerHTML = '';
  Object.entries(state.templates).forEach(([key, t]) => {
    const isCustom = !!state.custom[key];
    const c = document.createElement('div');
    c.className = 'chip' + (state.selectedCV === key ? ' active' : '');
    c.innerHTML = `
      <div class="actions">
        ${isCustom ? `<button class="icon-btn del" data-action="delete" data-key="${key}" title="Delete">&times;</button>` : ''}
      </div>
      <div class="name">${escapeHtml(t.label)}</div>
      <div class="status">&#10003; ${escapeHtml(t.cv_name)}</div>
    `;
    c.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (btn && btn.dataset.action === 'delete') {
        e.stopPropagation();
        deleteTemplate(btn.dataset.key);
        return;
      }
      state.selectedCV = key;
      applyTemplate();
      renderChips();
    });
    chipsEl.appendChild(c);
  });
}

function applyTemplate() {
  const t = state.templates[state.selectedCV];
  if (!t) return;
  subjectEl.value = t.subject;
  bodyEl.value = t.body;
}

// ---- toast ----
let toastTimer;
function toast(msg, type = '') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

// ---- API ----
async function testApi() {
  const url = apiUrlEl.value.trim().replace(/\/+$/, '');
  if (!url) { toast('Enter your API URL first', 'err'); return; }
  apiDot.className = 'status-dot';
  try {
    const r = await fetch(url + '/', { method: 'GET' });
    const d = await r.json();
    if (d.status === 'ok') {
      apiDot.className = 'status-dot ok';
      toast('\u2713 Backend online', 'ok');
      state.apiUrl = url;
      await storage.set('apiUrl', url);
    } else {
      apiDot.className = 'status-dot err';
      toast('Backend reachable but unexpected response', 'err');
    }
  } catch (err) {
    apiDot.className = 'status-dot err';
    toast('Could not reach backend: ' + err.message, 'err');
  }
}

async function send() {
  const to = hrEl.value.trim();
  if (!to || !to.includes('@')) { toast('Enter a valid HR email', 'err'); return; }
  const tpl = state.templates[state.selectedCV];
  if (!tpl || !tpl.cv_data) { toast('No CV loaded for this slot', 'err'); return; }
  const url = (apiUrlEl.value.trim() || state.apiUrl).replace(/\/+$/, '');
  if (!url) { toast('Configure the API URL first', 'err'); return; }

  sendBtn.disabled = true;
  sendBtn.textContent = '\u23F3 Launching...';

  try {
    const res = await fetch(url + '/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to,
        subject: subjectEl.value,
        body: bodyEl.value,
        cv_name: tpl.cv_name,
        cv_data: tpl.cv_data
      })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'Unknown server error');

    toast('\u2713 Email launched to ' + to, 'ok');
    addHistory({ to, cv: tpl.label, subject: subjectEl.value, ts: Date.now() });
    hrEl.value = '';
  } catch (err) {
    toast('\u2717 ' + err.message, 'err');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '\uD83D\uDE80 Launch Application';
  }
}

// ---- history ----
function renderHistory() {
  if (!state.history.length) {
    historyList.innerHTML = '<div class="empty">No emails sent yet.</div>';
    return;
  }
  historyList.innerHTML = state.history.map(h => `
    <div class="hist-item">
      <div class="he">${escapeHtml(h.to)}</div>
      <div class="meta">
        <span class="cv-tag">${escapeHtml(h.cv)}</span>
        <span>${formatTime(h.ts)}</span>
      </div>
    </div>
  `).join('');
}
async function addHistory(item) {
  state.history.unshift(item);
  state.history = state.history.slice(0, 50);
  await storage.set('history', JSON.stringify(state.history));
  renderHistory();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatTime(ts) {
  const d = new Date(ts);
  const pad = n => n.toString().padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ---- new template modal ----
let newCvData = null;
let newCvName = null;

function openModal() {
  $('newLabel').value = '';
  $('newSubject').value = '';
  $('newBody').value = '';
  $('newCvStatus').textContent = 'No file chosen (will reuse Full Stack CV)';
  $('newCvStatus').className = 'file-status';
  newCvData = null;
  newCvName = null;
  modalBg.classList.add('show');
}
function closeModal() { modalBg.classList.remove('show'); }

$('newCvBtn').addEventListener('click', () => $('newCvPicker').click());
$('newCvPicker').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.type !== 'application/pdf') { toast('Only PDFs allowed', 'err'); return; }
  if (file.size > 8 * 1024 * 1024) { toast('Max 8 MB', 'err'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    newCvData = reader.result.split(',')[1];
    newCvName = file.name;
    $('newCvStatus').textContent = '\u2713 ' + file.name;
    $('newCvStatus').className = 'file-status loaded';
  };
  reader.readAsDataURL(file);
});

async function saveTemplate() {
  const label = $('newLabel').value.trim();
  const subject = $('newSubject').value.trim();
  const body = $('newBody').value.trim();
  if (!label) { toast('Label is required', 'err'); return; }
  if (!subject) { toast('Subject is required', 'err'); return; }
  if (!body) { toast('Body is required', 'err'); return; }

  // generate stable key from label
  const key = 'custom_' + label.toLowerCase().replace(/[^a-z0-9]+/g, '_').slice(0, 30) + '_' + Date.now().toString(36);
  const cv_name = newCvName || EMBEDDED.fullstack.cv_name;
  const cv_data = newCvData || EMBEDDED.fullstack.cv_data;

  const newTpl = { label, subject, body, cv_name, cv_data };
  state.custom[key] = newTpl;
  state.templates[key] = newTpl;

  await storage.set('customTemplates', JSON.stringify(state.custom));
  toast('\u2713 Template saved', 'ok');
  closeModal();
  state.selectedCV = key;
  applyTemplate();
  renderChips();
}

async function deleteTemplate(key) {
  if (!confirm('Delete this template?')) return;
  delete state.custom[key];
  delete state.templates[key];
  await storage.set('customTemplates', JSON.stringify(state.custom));
  if (state.selectedCV === key) {
    state.selectedCV = 'flutter';
    applyTemplate();
  }
  renderChips();
  toast('Template deleted', 'ok');
}

// ---- init ----
async function init() {
  // load embedded defaults
  state.templates = { ...EMBEDDED };

  // load any user-added templates
  const saved = await storage.get('customTemplates');
  if (saved) {
    try {
      state.custom = JSON.parse(saved);
      Object.assign(state.templates, state.custom);
    } catch {}
  }

  // load saved API URL (overrides default if user changed it)
  const savedUrl = await storage.get('apiUrl');
  state.apiUrl = savedUrl || DEFAULT_API_URL;
  apiUrlEl.value = state.apiUrl;

  // load history
  const hist = await storage.get('history');
  if (hist) { try { state.history = JSON.parse(hist); } catch {} }

  applyTemplate();
  renderChips();
  renderHistory();

  // auto-test backend on load
  setTimeout(testApi, 200);
}

// ---- wire up ----
sendBtn.addEventListener('click', send);
$('testBtn').addEventListener('click', testApi);
$('addTplBtn').addEventListener('click', openModal);
$('cancelTpl').addEventListener('click', closeModal);
$('saveTpl').addEventListener('click', saveTemplate);
modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });
$('clearHist').addEventListener('click', async () => {
  if (!confirm('Clear sent history?')) return;
  state.history = [];
  await storage.set('history', '[]');
  renderHistory();
});

init();
</script>

</body>
